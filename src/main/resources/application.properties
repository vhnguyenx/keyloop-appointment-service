# ==========================================
# Application
# ==========================================
spring.application.name=unified-service-scheduler
server.port=8080

# ==========================================
# SQL Server Connection Properties
# ==========================================
# Overridable via environment variables (DB_URL, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ServiceAppointmentDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

## ==========================================
## Redis (Optional)
## ==========================================
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
#
# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
